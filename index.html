<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ToMO System Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Yuji+Syuku&display=swap" rel="stylesheet">
  
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  
  <style>
    :root { --primary: #00d2ff; --bg: #0b0f19; --card: #161e2d; --text: #94a3b8; --accent: #ff4b5c; --ok: #00ff88; --clock: #f3ff12; --tool: #ff9ff3; }
    * { font-family: "Yuji Syuku", serif; font-weight: 900; box-sizing: border-box; }
    
    body { margin: 0; background: var(--bg); color: var(--text); overflow-y: auto; line-height: 1.2; padding-top: env(safe-area-inset-top); }
    .container { padding: 8px; max-width: 600px; margin: auto; display: flex; flex-direction: column; min-height: 100vh; }
    
    .title { text-align: center; font-family: "Dancing Script", cursive; font-size: 20px; color: var(--primary); margin: 5px 0; }
    .clock-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 8px; border: 1px solid var(--clock); margin-bottom: 8px; }
    .tel-btn { background: #ff4b5c; color: #fff; text-decoration: none; padding: 4px 12px; border-radius: 8px; font-size: 14px; }
    
    .tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .tab-btn { flex: 1; padding: 12px; border: 1px solid #2d3748; background: #1a202c; color: #4b5563; cursor: pointer; font-size: 22px; border-radius: 8px; }
    .tab-btn.active { color: var(--primary); background: #2d3748; border-color: var(--primary); box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    .tab-tool { flex: 0 0 80px; padding: 12px 0; border: 1px solid #2d3748; background: #1a202c; color: #4b5563; cursor: pointer; font-size: 20px; border-radius: 8px; text-align: center; }
    .tab-tool.active { color: var(--tool); background: #2d3748; border-color: var(--tool); }
    
    .card { background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid #2d3748; margin-bottom: 10px; }
    .name-btn-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
    .input-label { font-size: 17px; color: var(--primary); white-space: nowrap; min-width: 50px; }
    
    .save-start-label { font-size: 12px; line-height: 1.1; color: var(--primary); text-align: center; white-space: nowrap; }

    .input-field { background: #010409; border: 1px solid #334155; border-radius: 8px; color: #fff; padding: 8px; font-size: 17px; flex: 1; min-width: 0; }
    .side-btn { background: #1e293b; color: var(--text); border: 1px solid #475569; padding: 8px 10px; border-radius: 8px; font-size: 14px; white-space: nowrap; cursor: pointer; flex: none; }

    .stepper-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stepper { background: #010409; border: 1px solid #334155; border-radius: 8px; text-align: center; position: relative; padding-top: 18px; }
    .stepper.disabled { opacity: 0.4; pointer-events: none; }
    .unit-label { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--text); font-family: sans-serif; white-space: nowrap; }
    .step-btn { background: #1e293b; color: var(--primary); border: none; width: 100%; padding: 4px; font-size: 16px; cursor: pointer; }
    .step-val-input { background: transparent; border: none; color: #fff; font-size: 24px; text-align: center; width: 100%; outline: none; }

    .main-btn { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 30px; font-size: 22px; cursor: pointer; }
    .main-btn:disabled { background: #2d3748; color: #4b5563; cursor: not-allowed; }
    .calc-btn { border: none; padding: 10px; border-radius: 30px; font-size: 16px; width: 100%; cursor: pointer; }
    
    .checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; padding: 2px 4px; }
    .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }
    .checkbox-label { font-size: 15px; color: var(--tool); cursor: pointer; white-space: nowrap; }

    .tool-table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #fff; font-size: 13px; }
    .tool-table th { background: rgba(255, 159, 243, 0.2); border: 1px solid #334155; padding: 6px; color: var(--tool); }
    .tool-table td { border: 1px solid #334155; padding: 4px; text-align: center; }

    .hist-item { background: #1c2536; border-radius: 12px; padding: 10px; margin-top: 10px; border-left: 6px solid #334155; }
    .hist-title-row { display: flex; justify-content: space-between; align-items: center; font-size: 19px; color: var(--primary); border-bottom: 1px solid #334155; margin-bottom: 8px; padding-bottom: 4px; }
    .hist-data-line { display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 4px; padding: 4px 6px; border-radius: 6px; align-items: center; gap:4px; overflow: hidden; }
    .edit-val { color: #fff; text-decoration: underline; text-align: left; flex: 1; min-height: 1.2em; border:none; background:transparent; font-size:16px; outline:none; min-width: 0; }
    .label-hist { min-width: 70px; color: var(--text); font-size: 15px; flex: none; }
    .apply-btn { background: var(--ok); color: #000; border: none; padding: 4px 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }

    .tool-gengo-btn { flex: 1; padding: 10px 0; font-size: 16px !important; border-radius: 8px; border: 1px solid #2d3748; background: #1a202c; color: #4b5563; cursor: pointer; }
    .tool-gengo-btn.active { color: var(--tool) !important; border-color: var(--tool) !important; background: #2d3748 !important; }
    .highlight-blue { background: rgba(0,210,255,0.25) !important; color: #fff !important; border: 1px solid var(--primary); }
    .highlight-yellow { background: rgba(243,255,18,0.25) !important; color: #fff !important; border: 1px solid var(--clock); }

    .tool-input-grid { display: grid; grid-template-columns: 100px 1fr; gap: 10px; }
    .tool-right-col { display: flex; flex-direction: column; gap: 6px; }
    .tool-row-item { display: flex; align-items: center; justify-content: center; height: 38px; }
  </style>
</head>
<body>
<div class="container">
  <div class="title">ToMO System Pro</div>
  
  <div class="clock-row">
    <div id="live-info" style="color:var(--clock); font-family:monospace; font-size:15px;">同期中...</div>
    <a href="tel:117" class="tel-btn" onclick="vibe()">117接続</a>
  </div>
  
  <div class="tabs">
    <button id="t-err" class="tab-btn active" onclick="switchTab('err')">誤差</button>
    <button id="t-calc" class="tab-btn" onclick="switchTab('calc')">計算</button>
    <button id="t-tool" class="tab-tool" onclick="switchTab('tool')">道具</button>
  </div>

  <div class="card">
    <div id="common-inputs">
      <div class="name-btn-row">
        <span class="input-label">名称</span>
        <input type="text" id="shared-name" class="input-field" placeholder="現場名など" oninput="keepInputs()">
        <button class="side-btn" onclick="toggleArea('detail-inputs')">詳細入力</button>
      </div>
      <div id="detail-inputs" style="display:none; margin-bottom:8px;">
        <div class="name-btn-row"><span class="input-label">住所</span><input type="text" id="shared-addr" class="input-field" oninput="keepInputs()"></div>
        <div class="name-btn-row"><span class="input-label">備考</span><input type="text" id="shared-note" class="input-field" oninput="keepInputs()"></div>
      </div>
      
      <div class="name-btn-row" style="gap: 4px;">
        <span class="save-start-label" style="width:50px;">保存<br>開始日</span>
        <input type="date" id="shared-start-date" class="input-field" style="padding:6px; font-size:15px;" onchange="syncDaysFromCalendar(this.value); keepInputs();">
        
        <span class="save-start-label" style="width:50px; margin-left:auto;">保存<br>期間</span>
        <input type="number" id="shared-days" class="input-field" style="max-width:65px; text-align:center; color:var(--clock); font-size:19px; padding:5px;" value="1" min="1" oninput="handlePeriodInput(this.value); keepInputs();">
        <span style="font-size:15px; flex:none;">日</span>
      </div>
    </div>

    <div id="view-err">
      
      <div id="std-time-stepper-container" class="stepper-grid" style="margin-top: 10px; margin-bottom: 8px; display: none;">
        <div id="box-current-h" class="stepper"><span class="unit-label">基準時</span><button class="step-btn" onclick="spin('current-h',1,23)">▲</button><input type="number" id="current-h" class="step-val-input" value="00"><button class="step-btn" onclick="spin('current-h',-1,23)">▼</button></div>
        <div id="box-current-m" class="stepper"><span class="unit-label">分</span><button class="step-btn" onclick="spin('current-m',1,59)">▲</button><input type="number" id="current-m" class="step-val-input" value="00"><button class="step-btn" onclick="spin('current-m',-1,59)">▼</button></div>
        <div id="box-current-s" class="stepper"><span class="unit-label">秒</span><button class="step-btn" onclick="spin('current-s',1,59)">▲</button><input type="number" id="current-s" class="step-val-input" value="00"><button class="step-btn" onclick="spin('current-s',-1,59)">▼</button></div>
      </div>

      <div class="checkbox-row" style="margin-bottom: 12px; justify-content: space-between; border-bottom: 1px dashed #334155; padding-bottom: 8px;">
        <div>
          <input type="checkbox" id="toggle-change-std" onchange="toggleStdTimeStepper(this.checked); vibe();">
          <label for="toggle-change-std" class="checkbox-label" style="margin-right: 12px;">現在時刻変更</label>
        </div>
        <div>
          <input type="checkbox" id="toggle-date-err" onchange="toggleDateStepper('err', this.checked); vibe();">
          <label for="toggle-date-err" class="checkbox-label">日付ずれ</label>
        </div>
      </div>

      <div id="date-stepper-area-err" class="stepper-grid" style="display: none;">
        <div class="stepper"><span class="unit-label">カメラ年</span><button class="step-btn" onclick="spin('e-yy',1,2100)">▲</button><input type="number" id="e-yy" class="step-val-input" value="2026"><button class="step-btn" onclick="spin('e-yy',-1,2020)">▼</button></div>
        <div class="stepper"><span class="unit-label">月</span><button class="step-btn" onclick="spin('e-mm',1,12)">▲</button><input type="number" id="e-mm" class="step-val-input" value="01"><button class="step-btn" onclick="spin('e-mm',-1,12)">▼</button></div>
        <div class="stepper"><span class="unit-label">日</span><button class="step-btn" onclick="spin('e-dd',1,31)">▲</button><input type="number" id="e-dd" class="step-val-input" value="01"><button class="step-btn" onclick="spin('e-dd',-1,31)">▼</button></div>
      </div>

      <div class="stepper-grid">
        <div class="stepper"><span class="unit-label">カメラ時</span><button class="step-btn" onclick="spin('e-h',1,23)">▲</button><input type="number" id="e-h" class="step-val-input" value="00"><button class="step-btn" onclick="spin('e-h',-1,23)">▼</button></div>
        <div class="stepper"><span class="unit-label">分</span><button class="step-btn" onclick="spin('e-m',1,59)">▲</button><input type="number" id="e-m" class="step-val-input" value="00"><button class="step-btn" onclick="spin('e-m',-1,59)">▼</button></div>
        <div class="stepper"><span class="unit-label">秒</span><button class="step-btn" onclick="spin('e-s',1,59)">▲</button><input type="number" id="e-s" class="step-val-input" value="00"><button class="step-btn" onclick="spin('e-s',-1,59)">▼</button></div>
      </div>

      <button id="main-measure-btn" class="main-btn" onclick="runMeasure()">誤 差</button>
    </div>

    <div id="view-calc" hidden>
      
      <div class="name-btn-row" style="justify-content: space-between; margin-bottom: 6px;">
        <span class="input-label" style="font-size: 23px; font-weight: bold; padding-left: 2px;">誤差</span>
        <button id="c-state-toggle" style="padding: 6px 20px; border-radius: 10px; border: 2px solid var(--accent); background: rgba(255,75,92,0.1); color: var(--accent); font-size: 18px;" onclick="toggleState()">遅れ</button>
      </div>

      <div id="calc-err-date-container" class="stepper-grid" style="display: none; margin-bottom: 8px;">
        <div class="stepper"><span class="unit-label">誤差年</span><button class="step-btn" onclick="spin('a-yy',1,2100)">▲</button><input type="number" id="a-yy" class="step-val-input" value="2026"><button class="step-btn" onclick="spin('a-yy',-1,2020)">▼</button></div>
        <div class="stepper"><span class="unit-label">誤差月</span><button class="step-btn" onclick="spin('a-mm',1,12)">▲</button><input type="number" id="a-mm" class="step-val-input" value="01"><button class="step-btn" onclick="spin('a-mm',-1,12)">▼</button></div>
        <div class="stepper"><span class="unit-label">誤差日</span><button class="step-btn" onclick="spin('a-dd',1,31)">▲</button><input type="number" id="a-dd" class="step-val-input" value="01"><button class="step-btn" onclick="spin('a-dd',-1,31)">▼</button></div>
      </div>

      <div class="stepper-grid">
        <div class="stepper"><span class="unit-label">時</span><button class="step-btn" onclick="spin('a-h',1,23)">▲</button><input type="number" id="a-h" class="step-val-input" value="00"><button class="step-btn" onclick="spin('a-h',-1,23)">▼</button></div>
        <div class="stepper"><span class="unit-label">分</span><button class="step-btn" onclick="spin('a-m',1,59)">▲</button><input type="number" id="a-m" class="step-val-input" value="00"><button class="step-btn" onclick="spin('a-m',-1,59)">▼</button></div>
        <div class="stepper"><span class="unit-label">秒</span><button class="step-btn" onclick="spin('a-s',1,59)">▲</button><input type="number" id="a-s" class="step-val-input" value="00"><button class="step-btn" onclick="spin('a-s',-1,59)">▼</button></div>
      </div>

      <div class="checkbox-row" style="margin-top: 10px; margin-bottom: 12px;">
        <input type="checkbox" id="toggle-date-calc" onchange="toggleDateStepper('calc', this.checked); vibe();">
        <label for="toggle-date-calc" class="checkbox-label">日付ずれ（計算基準の年月日）</label>
      </div>

      <div id="date-stepper-area-calc" class="stepper-grid" style="display: none;">
        <div class="stepper"><span class="unit-label">基準年</span><button class="step-btn" onclick="spin('c-yy',1,2100)">▲</button><input type="number" id="c-yy" class="step-val-input" value="2026"><button class="step-btn" onclick="spin('c-yy',-1,2020)">▼</button></div>
        <div class="stepper"><span class="unit-label">基準月</span><button class="step-btn" onclick="spin('c-mm',1,12)">▲</button><input type="number" id="c-mm" class="step-val-input" value="01"><button class="step-btn" onclick="spin('c-mm',-1,12)">▼</button></div>
        <div class="stepper"><span class="unit-label">基準日</span><button class="step-btn" onclick="spin('c-dd',1,31)">▲</button><input type="number" id="c-dd" class="step-val-input" value="01"><button class="step-btn" onclick="spin('c-dd',-1,31)">▼</button></div>
      </div>

      <div class="stepper-grid">
        <div class="stepper"><span class="unit-label">時</span><button class="step-btn" onclick="spin('c-h',1,23)">▲</button><input type="number" id="c-h" class="step-val-input" value="00"><button class="step-btn" onclick="spin('c-h',-1,23)">▼</button></div>
        <div class="stepper"><span class="unit-label">分</span><button class="step-btn" onclick="spin('c-m',1,59)">▲</button><input type="number" id="c-m" class="step-val-input" value="00"><button class="step-btn" onclick="spin('c-m',-1,59)">▼</button></div>
        <div class="stepper"><span class="unit-label">秒</span><button class="step-btn" onclick="spin('c-s',1,59)">▲</button><input type="number" id="c-s" class="step-val-input" value="00"><button class="step-btn" onclick="spin('c-s',-1,59)">▼</button></div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px;">
        <button id="calc-std-btn" class="calc-btn" style="background:linear-gradient(135deg,#00d2ff,#3a7bd5); color:#fff;" onclick="runCalc('std')">現在時刻を知る</button>
        <button id="calc-cam-btn" class="calc-btn" style="background:linear-gradient(135deg,#f3ff12,#ffcc00); color:#000;" onclick="runCalc('cam')">カメラ時刻を知る</button>
      </div>
    </div>

    <div id="view-tool" hidden>
      <div class="tabs" style="margin-bottom: 12px;">
        <button id="btn-sw" class="tool-gengo-btn" onclick="setGengo('showa')">昭和</button>
        <button id="btn-h" class="tool-gengo-btn" onclick="setGengo('heisei')">平成</button>
        <button id="btn-r" class="tool-gengo-btn active" onclick="setGengo('reiwa')">令和</button>
        <button id="btn-s" class="tool-gengo-btn" onclick="setGengo('seireki')">西暦</button>
      </div>
      <div class="card" style="background:rgba(255,159,243,0.05); border:1px solid var(--tool); padding:10px;">
        <div class="tool-input-grid">
          <div class="stepper" style="padding-top:15px; height: 100%;">
            <span id="gengo-label" class="unit-label">令和</span>
            <button class="step-btn" onclick="spinGengo(1)">▲</button>
            <input type="number" id="gengo-year" class="step-val-input" value="1" oninput="syncFromGengoInput()">
            <button class="step-btn" onclick="spinGengo(-1)">▼</button>
          </div>
          <div class="tool-right-col">
            <div class="tool-row-item">
              <span class="input-label" style="color:var(--tool); font-size:18px;">生年月日</span>
            </div>
            <div class="tool-row-item">
              <input type="date" id="birth-date" class="input-field" style="border-color:var(--tool); padding:4px 8px; width: 100%;" onchange="syncFromCalendar(this.value)">
            </div>
            <div class="tool-row-item" style="background:rgba(255,159,243,0.1); border-radius:8px; border:1px solid var(--tool);">
              <span id="res-age" style="font-size:18px; color:#fff;">-- 歳</span>
              <span style="margin: 0 8px; color:var(--tool);">/</span>
              <span id="res-eto" style="font-size:18px; color:var(--tool);">--</span>
            </div>
          </div>
        </div>
      </div>
      <table class="tool-table">
        <thead><tr><th>学校</th><th>入学</th><th>卒業</th></tr></thead>
        <tbody id="edu-body"></tbody>
      </table>
    </div>
  </div>

  <div id="hist-anchor"></div>
  <div id="hist-group">
    <div id="hist-area-err"></div>
    <div id="hist-area-calc" hidden></div>
  </div>
</div>

<script>
  // サービスワーカー（完全オフライン対応）の登録処理
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('ServiceWorker registered successfully.'))
      .catch(err => console.log('ServiceWorker registration failed:', err));
  }

  var serverOffset = 0, isSynced = false, isLate = true, currentGengo = 'reiwa';
  var masterYear = new Date().getFullYear();
  var hist = JSON.parse(localStorage.getItem("tomo_v195_hist")) || {err:[], calc:[]};
  var lastPeriodVal = 1;

  window.onload = function(){ 
    syncTime(); setInterval(upd, 1000); initTime();
    
    var n = new Date();
    var todayStr = n.getFullYear() + "-" + pad(n.getMonth()+1) + "-" + pad(n.getDate());
    document.getElementById("shared-start-date").value = todayStr;
    
    var initBirth = "1975-" + pad(n.getMonth()+1) + "-" + pad(n.getDate());
    syncFromCalendar(initBirth);
    loadInputs();
    
    if(!localStorage.getItem("tomo_v195_keep")){
      document.getElementById("shared-start-date").value = todayStr;
      document.getElementById("shared-days").value = "1";
    }
    lastPeriodVal = parseInt(document.getElementById("shared-days").value) || 1;
    
    render("err"); render("calc");
  };

  function initTime(){ 
    var n = new Date(); 
    document.getElementById("e-h").value=pad(n.getHours()); document.getElementById("e-m").value=pad(n.getMinutes()); document.getElementById("e-s").value="00";
    document.getElementById("c-h").value=pad(n.getHours()); document.getElementById("c-m").value=pad(n.getMinutes()); document.getElementById("c-s").value="00";
    document.getElementById("a-h").value="00"; document.getElementById("a-m").value="00"; document.getElementById("a-s").value="00";
    
    document.getElementById("current-h").value=pad(n.getHours()); document.getElementById("current-m").value=pad(n.getMinutes()); document.getElementById("current-s").value=pad(n.getSeconds());
    
    document.getElementById("e-yy").value=n.getFullYear(); document.getElementById("e-mm").value=pad(n.getMonth()+1); document.getElementById("e-dd").value=pad(n.getDate());
    document.getElementById("c-yy").value=n.getFullYear(); document.getElementById("c-mm").value=pad(n.getMonth()+1); document.getElementById("c-dd").value=pad(n.getDate());
    document.getElementById("a-yy").value=n.getFullYear(); document.getElementById("a-mm").value=pad(n.getMonth()+1); document.getElementById("a-dd").value=pad(n.getDate());
  }

  function syncTime(){ 
    if(typeof google !== 'undefined') { 
      var completed = false;
      var timeoutId = setTimeout(function(){ if(!completed) { completed = true; isSynced = true; } }, 1000);
      google.script.run.withSuccessHandler(function(ms){ if(!completed) { completed = true; clearTimeout(timeoutId); serverOffset = ms - Date.now(); isSynced = true; } })
      .withFailureHandler(function(){ if(!completed) { completed = true; clearTimeout(timeoutId); isSynced = true; } }).getServerTime(); 
    } else { isSynced = true; } 
  }
  
  function upd(){ 
    if(!isSynced) return; 
    var n = new Date(Date.now() + serverOffset); 
    document.getElementById("live-info").innerText = "令和" + (n.getFullYear()-2018) + "年" + (n.getMonth()+1) + "月" + n.getDate() + "日 " + pad(n.getHours()) + ":" + pad(n.getMinutes()) + ":" + pad(n.getSeconds()); 
    
    if(!document.getElementById("toggle-change-std").checked){
      document.getElementById("current-h").value = pad(n.getHours());
      document.getElementById("current-m").value = pad(n.getMinutes());
      document.getElementById("current-s").value = pad(n.getSeconds());
    }
  }

  function handlePeriodInput(val) {
    var nextDays = parseInt(val);
    if (isNaN(nextDays) || nextDays < 1) {
      document.getElementById("shared-days").value = 1;
      nextDays = 1;
    }
    var diffDays = nextDays - lastPeriodVal; 
    if (diffDays !== 0) {
      var dateInput = document.getElementById("shared-start-date");
      var d = new Date(dateInput.value);
      if (!isNaN(d.getTime())) {
        d.setDate(d.getDate() - diffDays); 
        dateInput.value = d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
      }
    }
    lastPeriodVal = nextDays;
  }

  function syncDaysFromCalendar(sStr){
    var s = new Date(sStr); s.setHours(0,0,0,0);
    var t = new Date(); t.setHours(0,0,0,0);
    var diff = Math.floor((t-s)/(24*3600*1000)) + 1;
    var finalDays = (diff>0) ? diff : 1;
    document.getElementById("shared-days").value = finalDays;
    lastPeriodVal = finalDays;
  }
